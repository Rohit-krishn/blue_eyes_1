<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classical Dancer Eyes</title>
    <style>
        /* Centers everything and sets a moody, dark background */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #12121c; 
            font-family: 'Georgia', serif;
            color: #f4f4f5;
        }

        /* Styles the quote above the eyes */
        .text-container {
            margin-bottom: 60px;
            font-size: 2.2rem;
            font-style: italic;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0, 191, 255, 0.3);
        }

        /* Layout for the two eyes */
        .eyes-container {
            display: flex;
            gap: 60px;
        }

        /* The main eye shape (Almond shape simulating classical dancer eyes) */
        .eye {
            width: 160px;
            height: 80px;
            background: #fff;
            /* Creates the almond shape */
            border-radius: 75% 15%;
            position: relative;
            overflow: hidden;
            /* Thick black border simulates heavy Kajal */
            border: 10px solid #050505;
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.2);
            /* Connects to the blink animation below */
            animation: blink 5s infinite;
        }

        /* Rotates the left eye to sit horizontally */
        .eye.left {
            transform: rotate(45deg);
        }

        /* Mirrors and rotates the right eye */
        .eye.right {
            animation: blink-right 5s infinite;
        }

        /* The blue iris */
        .iris {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #00bfff 20%, #00008b 90%);
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 45px;
            /* Counter-rotates so the pupil stays perfectly upright */
            transform: rotate(-45deg);
        }

        /* The dark pupil */
        .pupil {
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 23px;
            left: 23px;
        }

        /* The small light reflection in the eye */
        .catchlight {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        /* Animation for the left eye blinking */
        @keyframes blink {
            0%, 92%, 100% {
                transform: rotate(45deg) scaleY(1);
            }
            96% {
                transform: rotate(45deg) scaleY(0.1);
            }
        }

        /* Animation for the right eye blinking (accounting for the mirror flip) */
        @keyframes blink-right {
            0%, 92%, 100% {
                transform: rotate(45deg) scaleX(-1) scaleY(1);
            }
            96% {
                transform: rotate(45deg) scaleX(-1) scaleY(0.1);
            }
        }
    </style>
</head>
<body>

    <div class="text-container">
        "A dancer should always wear her kajal"
    </div>

    <div class="eyes-container">
        <div class="eye left">
            <div class="iris">
                <div class="pupil">
                    <div class="catchlight"></div>
                </div>
            </div>
        </div>
        
        <div class="eye right">
            <div class="iris">
                <div class="pupil">
                    <div class="catchlight"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
